<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ôn Thi Chuyên Môn Bất Động Sản</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; /* Ngăn chặn scroll toàn trang */
        }
        .option-card.active { border-color: #2563eb; background-color: #eff6ff; color: #1e40af; }
        .option-card.correct { border-color: #22c55e; background-color: #f0fdf4; color: #166534; }
        .option-card.incorrect { border-color: #ef4444; background-color: #fef2f2; color: #991b1b; }
        .option-card.disabled { opacity: 0.7; cursor: not-allowed; }
        
        /* Đảm bảo nội dung câu hỏi có thể scroll nếu quá dài trên màn hình nhỏ */
        .scrollable-content {
            max-height: calc(100vh - 320px);
            overflow-y: auto;
            scrollbar-width: thin;
        }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col">

    <!-- Screen: Menu -->
    <div id="screen-menu" class="flex-1 flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center border border-slate-100">
            <div class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 transform rotate-3 shadow-lg">
                <i class="fa-solid fa-book-open text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-800 mb-2 tracking-tight uppercase">Ôn Thi BĐS</h1>
            <p class="text-slate-500 mb-8 text-sm leading-relaxed px-4">Luyện tập bộ câu hỏi trắc nghiệm môi giới bất động sản mới nhất.</p>
            <button id="btn-start" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-95">
                Bắt đầu ngay
            </button>
        </div>
    </div>

    <!-- Screen: Quiz -->
    <div id="screen-quiz" class="hidden h-screen flex flex-col">
        <!-- Header -->
        <div class="bg-white border-b border-slate-100 p-3 shrink-0">
            <div class="max-w-4xl mx-auto flex flex-col gap-3">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 id="question-number-display" class="text-lg font-black text-slate-800 leading-none">CÂU 1</h2>
                        <div id="progress-container" class="w-24 bg-slate-100 h-1.5 rounded-full mt-2">
                            <div id="progress-bar" class="bg-blue-600 h-full rounded-full transition-all" style="width: 0%"></div>
                        </div>
                    </div>
                    
                    <!-- Stats Bar -->
                    <div class="flex gap-2 text-[10px] font-bold uppercase tracking-tighter md:text-xs">
                        <div title="Số câu đã hoàn thành" class="flex items-center gap-1 bg-blue-50 text-blue-600 px-2 py-1 rounded-lg border border-blue-100">
                            <i class="fa-solid fa-pen-to-square"></i> <span id="stat-answered">0</span>/<span class="stat-total">0</span>
                        </div>
                        <div title="Số câu trả lời đúng" class="flex items-center gap-1 bg-green-50 text-green-600 px-2 py-1 rounded-lg border border-green-100">
                            <i class="fa-solid fa-check"></i> <span id="stat-correct">0</span>
                        </div>
                        <div title="Số câu trả lời sai" class="flex items-center gap-1 bg-red-50 text-red-600 px-2 py-1 rounded-lg border border-red-100">
                            <i class="fa-solid fa-xmark"></i> <span id="stat-incorrect">0</span>
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-between bg-slate-50 px-3 py-1.5 rounded-xl border border-slate-100">
                    <div class="flex items-center text-xs font-bold text-slate-400">
                        <i class="fa-solid fa-filter mr-2"></i> LỌC:
                    </div>
                    <select id="filter-type" class="bg-transparent text-xs font-bold text-slate-600 outline-none cursor-pointer">
                        <option value="all">Tất cả câu hỏi</option>
                        <option value="incorrect">Câu làm sai</option>
                        <option value="unattempted">Câu chưa làm</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 overflow-hidden p-3 md:p-6">
            <div class="max-w-4xl mx-auto h-full flex flex-col">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 flex flex-col h-full overflow-hidden">
                    <div class="p-5 md:p-8 flex-1 overflow-y-auto scrollable-content">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-wider">Lý thuyết / Tình huống</span>
                        </div>
                        <h3 id="question-text" class="text-lg md:text-xl font-bold text-slate-800 leading-tight mb-6">
                            Nội dung câu hỏi?
                        </h3>

                        <div id="options-container" class="grid gap-3">
                            <!-- Options injected by JS -->
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="bg-slate-50 p-4 md:p-6 flex items-center justify-between border-t border-slate-100 shrink-0">
                        <button id="btn-prev" class="flex items-center gap-1 text-sm font-bold text-slate-400 hover:text-slate-600 transition-colors">
                            <i class="fa-solid fa-arrow-left"></i> TRƯỚC
                        </button>

                        <div class="flex gap-2">
                            <button id="btn-check" class="hidden px-5 py-3 bg-slate-800 text-white text-sm font-bold rounded-xl shadow-md active:scale-95">
                                KIỂM TRA
                            </button>
                            <button id="btn-next" disabled class="px-8 py-3 bg-blue-600 text-white text-sm font-bold rounded-xl shadow-md disabled:opacity-50 active:scale-95 transition-all">
                                TIẾP THEO <i class="fa-solid fa-arrow-right ml-1"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Screen: Result -->
    <div id="screen-result" class="hidden flex-1 flex items-center justify-center p-4">
        <div class="max-w-sm w-full bg-white rounded-3xl shadow-xl p-8 text-center border border-slate-100">
            <div class="text-5xl mb-4">🏆</div>
            <h2 class="text-xl font-bold text-slate-800">Kết quả ôn tập</h2>
            <div id="result-percent" class="text-5xl font-black text-blue-600 my-4">0%</div>
            <p id="result-text" class="text-sm text-slate-500 mb-8">Bạn đã trả lời đúng 0/0 câu.</p>
            <div class="grid gap-3">
                <button id="btn-retry" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-md active:scale-95">Thử lại từ đầu</button>
                <button id="btn-home" class="w-full bg-slate-100 text-slate-600 font-bold py-3 rounded-xl">Về trang chính</button>
            </div>
        </div>
    </div>

    <script>
        const allQuestions = [
 {
    question: "Chủ thể nào được phép cung cấp dịch vụ môi giới bất động sản tại Việt Nam?",
    options: [
      "Tổ chức, cá nhân kinh doanh dịch vụ bất động sản.",
      "Tổ chức, cá nhân có đủ điều kiện và được cấp phép hoạt động môi giới.",
      "Tổ chức có đăng ký kinh doanh ngành nghề môi giới và cá nhân có chứng chỉ môi giới.",
      "Doanh nghiệp có đăng ký ngành nghề kinh doanh bất động sản."
    ],
    correct: 2
  },
  {
    question: "Dịch vụ môi giới bất động sản là gì?",
    options: [
      "Là việc tìm kiếm đối tác để thực hiện giao dịch bất động sản.",
      "Là việc đại diện cho một bên để đàm phán hợp đồng mua bán bất động sản.",
      "Là dịch vụ cung cấp thông tin và tư vấn về pháp lý bất động sản.",
      "Là bên trung gian và nhận thù lao từ hoạt động môi giới mua bán, chuyển nhượng, cho thuê, cho thuê mua bất động sản."
    ],
    correct: 2
  },
  {
    question: "Thù lao môi giới bất động sản được xác định như thế nào?",
    options: [
      "Do pháp luật quy định một mức cố định theo tỷ lệ phần trăm giá trị giao dịch.",
      "Do các bên thỏa thuận trong hợp đồng dịch vụ môi giới bất động sản.",
      "Do Hiệp hội Bất động sản quy định mức sàn thù lao.",
      "Luôn được tính bằng 2% giá trị hợp đồng chuyển nhượng bất động sản."
    ],
    correct: 1
  },
  {
    question: "Dịch vụ môi giới bất động sản phải được thực hiện thông qua hình thức nào?",
    options: [
      "Giao dịch miệng giữa nhà môi giới và khách hàng.",
      "Văn bản thỏa thuận ghi nhớ giữa hai bên.",
      "Hợp đồng dịch vụ môi giới bất động sản.",
      "Biên bản xác nhận việc hoàn thành giao dịch."
    ],
    correct: 2
  },
  {
    question: "Vai trò quan trọng nhất của nhà môi giới đối với thị trường bất động sản là gì?",
    options: [
      "Giúp tăng giá trị bất động sản thông qua hoạt động quảng cáo.",
      "Đảm bảo tất cả các giao dịch đều có lợi nhuận cao.",
      "Là cầu nối, làm tăng tính thanh khoản và hiệu quả của thị trường.",
      "Cung cấp nguồn vốn cho các nhà đầu tư bất động sản."
    ],
    correct: 2
  },
  {
    question: "Khi thực hiện môi giới, nhà môi giới có được phép cùng lúc làm trung gian cho cả hai bên (bên bán và bên mua) trong cùng một giao dịch không?",
    options: [
      "Không được phép vì có thể dẫn đến xung đột lợi ích.",
      "Tùy thuộc vào loại hình bất động sản và giá trị giao dịch.",
      "Luôn được phép nếu có hợp đồng môi giới với cả hai bên."
    ],
    correct: 0
  },
  {
    question: "Nhà môi giới có được phép định đoạt (mua hoặc bán) bất động sản được môi giới hay không?",
    options: [
      "Không bao giờ được phép để đảm bảo tính khách quan.",
      "Được phép nếu là người duy nhất nắm giữ thông tin bất động sản đó.",
      "Được phép nếu có hợp đồng ủy quyền của chủ sở hữu bất động sản.",
      "Chỉ được phép nếu giá trị bất động sản dưới 1 tỷ đồng."
    ],
    correct: 2
  },
  {
    question: "Điều kiện kinh doanh dịch vụ môi giới bất động sản của tổ chức tại Việt Nam là gì?",
    options: [
      "Phải có vốn pháp định tối thiểu 20 tỷ đồng.",
      "Phải đăng ký kinh doanh tại địa phương và có 01 người có chứng chỉ môi giới.",
      "Phải thành lập doanh nghiệp, có tối thiểu 01 người có chứng chỉ môi giới bất động sản.",
      "Phải đăng ký thành lập Hợp tác xã và có giấy phép của Bộ Xây dựng."
    ],
    correct: 2
  },
  {
    question: "Chứng chỉ hành nghề môi giới bất động sản có giá trị sử dụng trong bao lâu?",
    options: [
      "Vô thời hạn, không cần gia hạn.",
      "03 năm kể từ ngày cấp, cần thi lại để cấp mới.",
      "05 năm kể từ ngày cấp.",
      "04 năm kể từ ngày cấp."
    ],
    correct: 2
  },
  {
    question: "Ở nhiều nước phát triển (ví dụ: Mỹ, Canada), nhà môi giới cá nhân (Agent) thường quản lý theo mô hình nào?",
    options: [
      "Cá nhân môi giới hoạt động độc lập và không cần chứng chỉ.",
      "Hoạt động chủ yếu thông qua các hiệp hội nghề nghiệp tự quản lý.",
      "Phải đăng ký với một sàn giao dịch hoặc công ty môi giới (brokerage firm) để được hoạt động.",
      "Được quản lý bởi Bộ Tài chính và không cần có chứng chỉ."
    ],
    correct: 2
  },
  {
    question: "Theo Luật Kinh doanh bất động sản 2023, Sàn giao dịch bất động sản được định nghĩa là gì?",
    options: [
      "Là nơi chỉ dành để trưng bày và quảng cáo bất động sản của các chủ đầu tư dự án.",
      "Là nơi giao dịch bắt buộc đối với tất cả các loại bất động sản trên thị trường sơ cấp.",
      "Là tổ chức kinh tế có chức năng chính là quản lý và điều hành thị trường bất động sản.",
      "Là nơi diễn ra các giao dịch về mua bán, chuyển nhượng, cho thuê, cho thuê lại, cho thuê mua bất động sản."
    ],
    correct: 3
  },
  {
    question: "Điều kiện về nhân sự bắt buộc để một tổ chức được thành lập và hoạt động Sàn giao dịch bất động sản là gi?",
    options: [
      "Phải có vốn pháp định tối thiểu 10 tỷ đồng và người quản lý sàn có chứng chỉ môi giới.",
      "Phải có ít nhất 03 cá nhân có chứng chỉ hành nghề môi giới bất động sản làm việc thường xuyên.",
      "Người quản lý, điều hành sản giao dịch bất động sản phải hoàn thành khóa đào tạo về quản lý, điều hành sàn giao dịch bất động sản và được cơ sở đào tạo cấp giấy chứng nhận hoàn thành khóa học quản lý, điều hành sàn giao dịch bất động sản.",
      "Phải có người quản lý có bằng cử nhân chuyên ngành bất động sản và có kinh nghiệm trên 02 năm."
    ],
    correct: 2
  },
  {
    question: "Một trong những nghĩa vụ chính của Sàn giao dịch bát động sản đối với các giao dịch được thực hiện tại Sàn là gì?",
    options: [
      "Có trách nhiệm hoàn toàn về tính pháp lý và quy hoạch của bất động sản được giao dịch.",
      "Bảo lãnh tài chính cho các bên tham gia giao dịch bất động sản để đảm bảo an toàn.",
      "Chịu trách nhiệm về thông tin và hỗ trợ các bên trong việc ký kết hợp đồng, hoàn tất thủ tục giao dịch.",
      "Bắt buộc các bên phải sử dụng dịch vụ định giá của Sàn trước khi thực hiện giao dịch."
    ],
    correct: 2
  },
  {
    question: "Nguồn thông tin nào về cụng bất động sản được coi là có độ tin cậy pháp lý cao nhất?",
    options: [
      "Thông tin từ các nhóm bán hàng của chủ đầu tư trên mạng xã hội.",
      "Thông tin từ các nhà môi giới có thâm niên trong khu vực.",
      "Các quảng cáo trên báo, đài hoặc các trang rao vặt lớn.",
      "Thông tin trực tiếp từ giấy chứng nhận quyền sử dụng đát. hồ sơ pháp lý dự án, hoặc cơ quan nhà nước có thẩm quyền."
    ],
    correct: 3
  },
  {
    question: "Trong một giao dịch chuyển nhượng, bát động sản của cá nhần đã kết hôn, ai là người được xác định là đối tượng tham gia ký kết hợp đồng bán?",
    options: [
      "Chỉ người đứng tên trên Giấy chứng nhận quyền sử dụng đất.",
      "Bất kỳ ai trong gia đình nếu có giấy ủy quyền.",
      "Người đứng tên trên Giấy chứng nhận và người còn lại trong quan hệ vợ chồng.",
      "Chỉ cần người đứng tên trên hợp đồng mua bán trước đây."
    ],
    correct: 2
  },
  {
    question: "Khi môi giới giao dịch bất động sản thuộc sở hữu của doanh nghiệp, ai có thẩm quyền ký hợp đồng chuyển nhượng?",
    options: [
      "Chỉ cần kế toán trưởng xác nhận về mặt tài chính.",
      "Bất kỳ cá nhân nào có tên trong danh sách nhân viên của doanh nghiệp.",
      "Giám đốc, Tổng Giám đốc hoặc người được ủy quyền hợp pháp theo Điều lệ công ty.",
      "Chủ tịch Hội đồng Quản trị hoặc Hội đồng Thành viên."
    ],
    correct: 2
  },
  {
    question: "Hồ sơ thương vụ môi giới (Deal File) được lập ra nhằm mục đích gì?",
    options: [
      "Để nộp cho cơ quan thuế khi giao dịch hoàn thành.",
      "Chỉ để nhà môi giới xem xét nội bộ, không có giá trị pháp lý.",
      "Để lưu trữ, quản lý thông tin, và làm cơ sở giải quyết tranh chấp (nếu có).",
      "Để gửi cho đối thủ cạnh tranh nhằm mục đích học hỏi kinh nghiệm."
    ],
    correct: 2
  },
  {
    question: "Khi lập hồ sơ cho bất động sản hình thành trong tương lai, tài liệu pháp lý quan trọng nhất cần thu thập là gì?",
    options: [
      "Hợp đồng bảo hiểm cháy nổ của toàn bộ dự án.",
      "Giấy chứng nhận về quyền sở hữu căn hộ mẫu của dự án.",
      "Hợp đồng lao động của Giám đốc Chủ đầu tư.",
      "Văn bản chấp thuận cho phép bán, cho thuê mua của cơ quan nhà nước có thẩm quyền."
    ],
    correct: 3
  },
  {
    question: "Khi môi giới bất động sản đang bị thế chấp tại ngân hàng, nhà môi giới cần làm gì để đảm bảo giao dịch hợp pháp?",
    options: [
      "Chỉ cần thông báo bằng miệng cho bên mua về viêc đang thế chấp.",
      "Ký hợp đồng mua bán và cam kết sẽ giải chấp sau.",
      "Yêu cầu bên bán phải tất toán khoản nợ trước khi ký hợp đồng đặt cọc.",
      "Bắt buộc phải có văn bản đồng ý của bên nhận thế chấp (ngân hàng) về việc bán bất động sản đó."
    ],
    correct: 3
  },
  {

      "Xem xét lý do chậm trế, nếu hợp lý có thể đồng ý gia hạn nhưng nên lập thành văn bản (phụ lục hợp đồng) ghi rõ thời hạn mới và có thể kèm theo điều kiện (ví dụ: bên bán chịu chi phí thuê nhà phát sinh cho bên mua trong 1 tuần đó).",
      "Thuê người đến chuyển đồ của bên bán đi."
    ],
    correct: 2
  },
  {
    question: "Tình huống: Trong quá trình đàm phán, nhà môi giới nhận thấy cả bên mua và bên bán đều có thiện chí nhưng gặp khó khăn trong việc tìm tiếng nói chung về một vài điều khoản nhỏ. Nhà môi giới nên đóng vai trò gì?",
    options: [
      "Đứng về phía bên trả hoa hồng cao hơn.",
      "Đề xuất các giải pháp trung gian, các phương án thỏa hiệp công bằng cho các điều khoản nhỏ đó để giúp hai bên vượt qua điểm nghẽn và đi đến thỏa thuận cuối cùng.",
      "Để hai bên tự giải quyết các vấn để nhỏ đó.",
      "Tuyên bố đàm phán thất bại."
    ],
    correct: 1
  },
  {
    question: "Tình huống: Hợp đồng đặt cọc không ghi rõ về việc ai sẽ chịu chi phí công chứng hợp đồng mua bán. Theo thông lệ tại nhiều địa phương ở Việt Nam, chi phí này thường do ai chịu?",
    options: [
      "Người bán chịu hoàn toàn.",
      "Người mua chịu hoàn toàn.",
      "Nhà môi giới chịu.",
      "Thường do người mua chịu, hoặc hai bên thỏa thuận chia đôi."
    ],
    correct: 3
  }

        ];

        let currentFilteredQuestions = [...allQuestions];
        let currentIdx = 0;
        let userAnswers = new Array(allQuestions.length).fill(null);
        let confirmedAnswers = new Array(allQuestions.length).fill(false); // Lưu trạng thái đã nhấn "Kiểm tra"
        let isShowingExplanation = false;

        function calculateStats() {
            let answered = 0;
            let correct = 0;
            let incorrect = 0;

            // Chỉ tính những câu đã được "Xác nhận" (nhấn Kiểm tra hoặc đã qua câu đó)
            userAnswers.forEach((ans, i) => {
                if (ans !== null && confirmedAnswers[i]) {
                    answered++;
                    if (ans === allQuestions[i].correct) {
                        correct++;
                    } else {
                        incorrect++;
                    }
                }
            });

            return { answered, correct, incorrect, total: allQuestions.length };
        }

        function updateUI() {
            const stats = calculateStats();
            
            // Cập nhật hiển thị thống kê
            $('#stat-answered').text(stats.answered);
            $('.stat-total').text(stats.total);
            $('#stat-correct').text(stats.correct);
            $('#stat-incorrect').text(stats.incorrect);

            if (currentFilteredQuestions.length === 0) {
                $('#question-text').text("Không có câu hỏi nào trong mục này.");
                $('#options-container').empty();
                $('#btn-check').hide();
                $('#btn-next').prop('disabled', true);
                return;
            }

            const q = currentFilteredQuestions[currentIdx];
            const realIdx = allQuestions.indexOf(q);
            
            // Nếu câu này đã được xác nhận trước đó (khi quay lại), ta hiện luôn giải thích
            if (confirmedAnswers[realIdx]) {
                isShowingExplanation = true;
            }

            $('#question-number-display').text(`CÂU ${realIdx + 1}`);
            $('#question-text').text(q.question);
            
            const progress = ((currentIdx + 1) / currentFilteredQuestions.length) * 100;
            $('#progress-bar').css('width', `${progress}%`);

            $('#options-container').empty();
            q.options.forEach((opt, i) => {
                const isSelected = userAnswers[realIdx] === i;
                const isCorrect = i === q.correct;
                
                let btnClass = "option-card w-full text-left p-4 rounded-xl border-2 transition-all flex items-start gap-3 relative text-sm ";
                let icon = "";

                if (isShowingExplanation) {
                    if (isCorrect) {
                        btnClass += "correct bg-green-50";
                        icon = '<i class="fa-solid fa-check absolute right-4 top-1/2 -translate-y-1/2 text-green-600"></i>';
                    } else if (isSelected) {
                        btnClass += "incorrect bg-red-50";
                        icon = '<i class="fa-solid fa-xmark absolute right-4 top-1/2 -translate-y-1/2 text-red-600"></i>';
                    } else {
                        btnClass += "disabled border-slate-50 opacity-40";
                    }
                } else {
                    if (isSelected) btnClass += "active bg-blue-50";
                    else btnClass += "border-slate-100 bg-white text-slate-600 hover:bg-slate-50";
                }

                const btn = $(`
                    <button class="${btnClass}" ${isShowingExplanation ? 'disabled' : ''}>
                        <span class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 font-bold text-xs ${isSelected ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-400'}">
                            ${String.fromCharCode(65 + i)}
                        </span>
                        <span class="pt-1.5 leading-tight pr-6">${opt}</span>
                        ${icon}
                    </button>
                `);

                btn.on('click', () => {
                    userAnswers[realIdx] = i;
                    updateUI();
                });

                $('#options-container').append(btn);
            });

            $('#btn-prev').css('visibility', currentIdx === 0 ? 'hidden' : 'visible');
            
            // Nút kiểm tra chỉ hiện khi đã chọn đáp án và chưa xác nhận kết quả
            if (!isShowingExplanation && userAnswers[realIdx] !== null && !confirmedAnswers[realIdx]) {
                $('#btn-check').show();
            } else {
                $('#btn-check').hide();
            }

            // Nút Tiếp theo hiện khi đã chọn đáp án
            $('#btn-next').prop('disabled', userAnswers[realIdx] === null);
            if (currentIdx === currentFilteredQuestions.length - 1) {
                $('#btn-next').html('XONG <i class="fa-solid fa-flag"></i>');
            } else {
                $('#btn-next').html('TIẾP <i class="fa-solid fa-arrow-right"></i>');
            }
        }

        $(document).ready(function() {
            $('#btn-start').on('click', function() {
                $('#screen-menu').hide();
                $('#screen-quiz').removeClass('hidden').show();
                updateUI();
            });

            $('#btn-next').on('click', function() {
                const q = currentFilteredQuestions[currentIdx];
                const realIdx = allQuestions.indexOf(q);
                
                // Khi nhấn Tiếp, nếu chưa kiểm tra thì coi như xác nhận luôn đáp án hiện tại để tính vào thống kê
                confirmedAnswers[realIdx] = true;

                if (currentIdx < currentFilteredQuestions.length - 1) {
                    currentIdx++;
                    isShowingExplanation = false;
                    updateUI();
                    $('.scrollable-content').scrollTop(0);
                } else {
                    showResult();
                }
            });

            $('#btn-prev').on('click', function() {
                if (currentIdx > 0) {
                    currentIdx--;
                    // Khi quay lại, ta giữ nguyên trạng thái giải thích nếu đã xác nhận
                    isShowingExplanation = false; 
                    updateUI();
                }
            });

            $('#btn-check').on('click', function() {
                const q = currentFilteredQuestions[currentIdx];
                const realIdx = allQuestions.indexOf(q);
                confirmedAnswers[realIdx] = true; // Xác nhận câu này để tính vào thống kê
                isShowingExplanation = true;
                updateUI();
            });

            $('#filter-type').on('change', function() {
                const type = $(this).val();
                if (type === 'all') currentFilteredQuestions = [...allQuestions];
                else if (type === 'incorrect') currentFilteredQuestions = allQuestions.filter((q, i) => userAnswers[i] !== null && userAnswers[i] !== q.correct && confirmedAnswers[i]);
                else if (type === 'unattempted') currentFilteredQuestions = allQuestions.filter((q, i) => userAnswers[i] === null);
                
                currentIdx = 0;
                isShowingExplanation = false;
                updateUI();
            });

            $('#btn-retry').on('click', function() {
                userAnswers = new Array(allQuestions.length).fill(null);
                confirmedAnswers = new Array(allQuestions.length).fill(false);
                currentIdx = 0;
                isShowingExplanation = false;
                $('#screen-result').hide();
                $('#screen-quiz').show();
                updateUI();
            });

            $('#btn-home').on('click', function() {
                $('#screen-result').hide();
                $('#screen-menu').show();
            });
        });

        function showResult() {
            // Đảm bảo tất cả câu đã làm được tính
            userAnswers.forEach((ans, i) => {
                if (ans !== null) confirmedAnswers[i] = true;
            });
            
            const stats = calculateStats();
            const percent = Math.round((stats.correct / stats.total) * 100);
            $('#result-percent').text(`${percent}%`);
            $('#result-text').html(`Bạn đã đúng <b>${stats.correct}</b>/${stats.total} câu.<br><small class="text-red-400">Sai ${stats.incorrect} câu</small>`);
            $('#screen-quiz').hide();
            $('#screen-result').removeClass('hidden').show();
        }
    </script>
</body>
</html>
